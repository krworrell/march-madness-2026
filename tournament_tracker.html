<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Worrell — 2026 March Madness Tracker</title>
<style>
:root{--bg:#0a0e1a;--card:#131829;--card2:#1a2035;--border:#252d45;--text:#e4e6eb;--muted:#7a829e;--accent:#4f8cff;--green:#2dd4a0;--red:#f0506e;--orange:#f5a623;--gold:#ffd700;--south:#f0506e;--west:#4f8cff;--east:#2dd4a0;--midwest:#f5a623;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
.app{max-width:1500px;margin:0 auto;padding:12px;}
h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{color:var(--muted);font-size:12px;margin-top:2px;}

/* Tabs */
.tabs{display:flex;gap:2px;margin:12px 0;background:var(--card);border-radius:10px;padding:3px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;cursor:pointer;color:var(--muted);font-weight:600;font-size:12px;transition:all 0.2s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--accent);color:#fff;}
.tab-content{display:none;}.tab-content.active{display:block;}

/* Portfolio Table */
.portfolio-table{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0;margin-bottom:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--card2);color:var(--muted);padding:6px 8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;position:sticky;top:0;}
td{padding:5px 8px;border-bottom:1px solid var(--border);}
tr:hover td{background:var(--card2);}
.positive{color:var(--green);}.negative{color:var(--red);}
.team-strikethrough{text-decoration:line-through;opacity:0.5;}
tr.eliminated-row td{opacity:0.55;}
tr.eliminated-row .team-cell{text-decoration:line-through;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.card h3{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--muted);}

/* Filter Toggle */
.filter-toggle{display:flex;gap:8px;margin-bottom:12px;}
.toggle-btn{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card2);color:var(--muted);cursor:pointer;font-weight:600;font-size:12px;transition:all 0.2s;}
.toggle-btn:hover{border-color:var(--accent);}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Viewing Guide */
.game-slot{display:grid;grid-template-columns:60px 50px 1fr 50px 70px 80px;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.game-slot:hover{background:var(--card2);}
.game-slot.ours{background:rgba(79,140,255,0.08);border-left:3px solid var(--accent);}
.game-slot.oursVsOurs{background:rgba(245,166,35,0.08);border-left:3px solid var(--orange);}
.game-slot.hidden{display:none;}
.channel{font-weight:700;font-size:11px;padding:2px 6px;border-radius:4px;text-align:center;}
.channel.CBS{background:#1a5276;color:#fff;}
.channel.TBS{background:#2c3e50;color:#fff;}
.channel.TNT{background:#4a235a;color:#fff;}
.channel.truTV{background:#196f3d;color:#fff;}
.spread{color:var(--muted);font-size:11px;text-align:center;}
.team-name{font-weight:600;}
.team-name.mine{color:var(--accent);}
.seed-badge{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;font-weight:700;font-size:10px;background:var(--card2);color:var(--text);margin-right:4px;}
.note{font-size:10px;padding:3px 8px;border-radius:4px;margin-left:6px;}
.note.root-for{background:rgba(45,212,160,0.15);color:var(--green);}
.note.root-against{background:rgba(240,80,110,0.15);color:var(--red);}
.note.watch{background:rgba(245,166,35,0.15);color:var(--orange);}
.note.conflict{background:rgba(245,166,35,0.25);color:var(--orange);font-weight:700;}
.importance{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
.imp-high{background:var(--red);}
.imp-med{background:var(--orange);}
.imp-low{background:var(--green);}

/* Day header */
.day-header{background:var(--card2);padding:8px 12px;font-weight:700;font-size:13px;border-radius:6px;margin:10px 0 6px;}
.time-header{background:var(--border);padding:4px 12px;font-size:11px;color:var(--muted);font-weight:600;}
.section-divider{margin:18px 0 8px;padding:10px 12px;background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:8px;font-weight:700;font-size:14px;color:var(--accent);}

/* Bracket Styles */
.bracket-container{display:flex;flex-direction:column;gap:20px;}
.region-bracket{margin-bottom:20px;}
.region-bracket h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
.region-bracket.south h3{color:var(--south);}
.region-bracket.west h3{color:var(--west);}
.region-bracket.east h3{color:var(--east);}
.region-bracket.midwest h3{color:var(--midwest);}

.bracket-grid{display:grid;grid-template-columns:auto auto auto auto;gap:0;column-gap:16px;align-items:start;}
.bracket-column{display:flex;flex-direction:column;gap:12px;justify-content:space-around;}
.bracket-column h4{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:4px;text-align:center;}
.bracket-payout{font-size:11px;color:var(--green);font-weight:700;text-align:center;margin-bottom:2px;}

.team-slot{background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:8px;min-width:120px;cursor:pointer;transition:all 0.2s;font-size:11px;}
.team-slot:hover{border-color:var(--accent);background:var(--card);}
.team-slot.empty{color:var(--muted);text-align:center;font-style:italic;}
.team-slot.our-team{border-left:3px solid var(--accent);background:rgba(79,140,255,0.1);}
.team-slot.our-team .team-name{color:var(--accent);font-weight:700;}
.team-slot.eliminated{opacity:0.4;color:var(--muted);text-decoration:line-through;}

.team-slot.confirmed-winner{border-left:3px solid var(--green);background:rgba(45,212,160,0.08);cursor:default;}
.team-slot.confirmed-winner:hover{border-color:var(--green);background:rgba(45,212,160,0.08);}
.team-slot.confirmed-winner .team-slot-name{color:var(--green);font-weight:700;}
.team-slot.confirmed-loser{opacity:0.35;text-decoration:line-through;cursor:default;border-left:3px solid var(--red);}
.team-slot.confirmed-loser:hover{background:var(--card2);border-color:var(--red);}
.team-slot-score{font-size:9px;color:var(--muted);font-weight:600;margin-top:1px;}
.r2-schedule-info{font-size:9px;color:var(--muted);margin-top:4px;padding:3px 6px;background:var(--card);border-radius:3px;text-align:center;}

.team-slot-content{display:flex;flex-direction:column;gap:2px;}
.team-slot-name{font-weight:600;color:var(--text);}
.team-slot-seed{font-size:9px;color:var(--muted);}
.team-slot-price{font-size:9px;color:var(--accent);margin-top:2px;font-weight:600;}

.final-four-container{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:20px;}
.final-four-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;align-items:center;}
.ff-column{display:flex;flex-direction:column;gap:12px;}
.ff-column h4{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;text-align:center;margin-bottom:4px;}
.ff-payout{font-size:11px;color:var(--green);font-weight:700;text-align:center;margin-bottom:2px;}
.ff-champion{grid-column:1/5;text-align:center;}
.ff-champion h4{margin-bottom:8px;}

/* Teams remaining counter */
.teams-remaining{display:flex;gap:16px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--muted);align-items:center;}
.teams-remaining .counter{padding:4px 10px;border-radius:6px;font-weight:700;font-size:12px;}
.counter.all-teams{background:rgba(79,140,255,0.15);color:var(--accent);}
.counter.haut-teams{background:rgba(245,166,35,0.15);color:var(--orange);}
.status-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;}
.status-badge.alive{background:rgba(45,212,160,0.15);color:var(--green);}
.status-badge.eliminated{background:rgba(240,80,110,0.15);color:var(--red);}
.status-badge.today{background:rgba(79,140,255,0.15);color:var(--accent);}
.status-badge.won-r1{background:rgba(45,212,160,0.15);color:var(--green);}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:1000px){.grid-2,.grid-4{grid-template-columns:1fr;}}

/* Scenario cards */
.scenario{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.scenario h4{font-size:13px;font-weight:700;margin-bottom:6px;}
.scenario .prob{color:var(--muted);font-size:11px;}
.scenario .payout{font-size:16px;font-weight:700;margin:4px 0;}
.scenario .path{font-size:11px;color:var(--muted);line-height:1.6;}
.scenario .path .win{color:var(--green);}
.scenario .path .loss{color:var(--red);}
</style>
</head>

// Get actual confirmed winnings for a team
function getActualWinnings(teamName) {
  let total = 0;
  if (!isMine(teamName)) return 0;
  Object.entries(CONFIRMED).forEach(([key, result]) => {
    if (result.winner === teamName) {
      if (key.includes('-r1-')) total += PER_WIN.R1;
      else if (key.includes('-r2-')) total += PER_WIN.R2;
      else if (key.includes('-s16-')) total += PER_WIN.S16;
      else if (key.includes('-e8-')) total += PER_WIN.E8;
    }
  });
  return total;
}

// Get team info from bracket
function findTeamInfo(teamName) {
  for (const [region, games] of Object.entries(BRACKET)) {
    for (const game of games) {
      if (game.t1 === teamName) return {name: teamName, seed: game.s1, region};
      if (game.t2 === teamName) return {name: teamName, seed: game.s2, region};
    }
  }
  return null;
}

// Calculate payouts for a team based on picks (for bracket predictions)
function getTeamPayouts(teamName) {
  let totalPayout = 0;
  if (!isMine(teamName)) return 0;
  Object.entries(picks).forEach(([key, val]) => {
    if (val !== teamName) return;
    if (key.includes('-r1-')) totalPayout += PER_WIN.R1;
    else if (key.includes('-r2-')) totalPayout += PER_WIN.R2;
    else if (key.includes('-s16-')) totalPayout += PER_WIN.S16;
    else if (key.includes('-e8-')) totalPayout += PER_WIN.E8;
    else if (key.startsWith('ff-')) totalPayout += PER_WIN.F4;
    else if (key.startsWith('champ-')) totalPayout += PER_WIN.Champ;
  });
  return totalPayout;
}

// ============================================================
// PORTFOLIO TABLE
// ============================================================
function renderPortfolio(){
  let rows = [];

  Object.entries(MY).forEach(([teamName, price]) => {
    const info = findTeamInfo(teamName);
    const actualWon = getActualWinnings(teamName);
    // Potential = picks-based payouts from future (non-confirmed) rounds only
    const totalFromPicks = getTeamPayouts(teamName);
    const potential = Math.max(0, totalFromPicks - actualWon);
    const netBalance = actualWon + potential - price;
    const isElim = ELIMINATED.has(teamName);
    const wonR1 = R1_WINNERS.has(teamName);
    const playsToday = PLAYS_TODAY.has(teamName);

    let status, statusClass;
    if (isElim) { status = 'Eliminated'; statusClass = 'eliminated'; }
    else if (wonR1) { status = 'Won R1'; statusClass = 'won-r1'; }
    else if (playsToday) { status = 'Plays Today'; statusClass = 'today'; }
    else { status = 'Alive'; statusClass = 'alive'; }

    rows.push({ teamName, region: info ? info.region : '?', seed: info ? info.seed : 0, price, actualWon, potential, netBalance, isElim, status, statusClass });
  });

  // Sort: active teams first (won R1 first, then plays today), eliminated at bottom
  const statusOrder = {'Won R1': 0, 'Plays Today': 1, 'Alive': 1, 'Eliminated': 2};
  rows.sort((a,b) => (statusOrder[a.status] || 1) - (statusOrder[b.status] || 1) || b.price - a.price);

  let html = '<table><thead><tr><th>Team</th><th>Region</th><th>Seed</th><th>Price Paid</th><th>Won to Date</th><th>Potential Winnings</th><th>Net Balance</th><th>Status</th></tr></thead><tbody>';

  let totalPrice = 0, totalWon = 0, totalPotential = 0;

  rows.forEach(row => {
    totalPrice += row.price;
    totalWon += row.actualWon;
    totalPotential += row.potential;

    const rowClass = row.isElim ? 'eliminated-row' : '';
    const balanceClass = row.netBalance >= 0 ? 'positive' : 'negative';
    const label = tl(row.teamName);

    html += `<tr class="${rowClass}">
      <td class="team-cell" style="font-weight:600;">${label}</td>
      <td>${row.region}</td>
      <td>#${row.seed}</td>
      <td>${fmt(row.price)}</td>
      <td class="${row.actualWon > 0 ? 'positive' : ''}">${fmt(row.actualWon)}</td>
      <td class="${row.potential > 0 ? 'positive' : ''}" style="font-style:${row.potential > 0 ? 'italic' : 'normal'};">${row.potential > 0 ? fmt(row.potential) : '—'}</td>
      <td class="${balanceClass}">${row.netBalance >= 0 ? '+' : ''}${fmt(row.netBalance)}</td>
      <td><span class="status-badge ${row.statusClass}">${row.status}</span></td>
    </tr>`;
  });

  const totalNet = totalWon + totalPotential - totalPrice;
  html += `<tr style="font-weight:700;background:var(--card2);">
    <td>TOTAL</td><td></td><td></td>
    <td>${fmt(totalPrice)}</td>
    <td class="positive">${fmt(totalWon)}</td>
    <td class="${totalPotential > 0 ? 'positive' : ''}" style="font-style:italic;">${totalPotential > 0 ? fmt(totalPotential) : '—'}</td>
    <td class="${totalNet >= 0 ? 'positive' : 'negative'}">${totalNet >= 0 ? '+' : ''}${fmt(totalNet)}</td>
    <td></td>
  </tr>`;

  html += '</tbody></table>';
  if (totalPotential > 0) {
    html += '<div style="font-size:10px;color:var(--muted);padding:6px 10px;font-style:italic;">Potential Winnings are based on your bracket predictions. Click teams through in the Interactive Bracket tab to update.</div>';
  }
  document.getElementById('portfolioTable').innerHTML = html;
}

      let r2t2Mine = r2t2 ? isMine(r2t2) : false;

      let r2t1Seed = r2t1 ? (findTeamInfo(r2t1)?.seed || 0) : null;
      let r2t2Seed = r2t2 ? (findTeamInfo(r2t2)?.seed || 0) : null;

      html += '<div style="display:flex;gap:2px;flex-direction:column;">';

      if (r2t1) {
        html += `<div class="team-slot ${r2t2Picked ? 'eliminated' : ''} ${r2t1Mine ? 'our-team' : ''}" onclick="pickTeam('${r2Key}','${esc(r2t1)}')">
          <div class="team-slot-content">
            <div class="team-slot-name">${r2t1Picked ? '✓ ' : ''}${tl(r2t1)}</div>
            <div class="team-slot-seed">#${r2t1Seed}</div>
            ${r2t1Mine ? `<div class="team-slot-price">${fmt(MY[r2t1])}</div>` : ''}
          </div>
        </div>`;
      } else {
        html += `<div class="team-slot empty">TBD</div>`;
      }

      if (r2t2) {
        html += `<div class="team-slot ${r2t1Picked ? 'eliminated' : ''} ${r2t2Mine ? 'our-team' : ''}" onclick="pickTeam('${r2Key}','${esc(r2t2)}')">

      html += '</div>';
    }
    html += '</div>';

    // S16: 2 matchups
    html += '<div class="bracket-column">';
    html += '<div><div class="bracket-payout">S16 Win: ' + fmt(PER_WIN.S16) + '</div><h4>S16 (2)</h4></div>';

    for (let sIdx = 0; sIdx < 2; sIdx++) {

      const s16t2 = picks[`${region}-r2-${r2Idx2}`];

      const s16t2Picked = s16Picked === s16t2;

      if (s16t1) {

        const mine = isMine(s16t2);

      html += '</div>';

    html += '</div>';

    // E8: 1 matchup
    html += '<div class="bracket-column">';

    html += '</div></div>';
  });

  html += '<div class="final-four-container"><h3 style="margin-bottom:16px;">FINAL FOUR & CHAMPIONSHIP</h3>';

  html += renderFF('ff-0', southE8, eastE8, 'F4 - 1 (South vs East)');

  // F4-2: West vs Midwest
  const westE8 = picks['WEST-e8-0'], midwestE8 = picks['MIDWEST-e8-0'];
  html += renderFF('ff-1', westE8, midwestE8, 'F4 - 2 (West vs Midwest)');

  // Championship
  const ff0W = picks['ff-0'], ff1W = picks['ff-1'];
  html += renderFF('champ-0', ff0W, ff1W, 'Championship');

  // Champion display
  const champion = picks['champ-0'];
  html += '<div class="ff-column ff-champion"><div><h4>Champion</h4></div>';
  if (champion) {
    const info = findTeamInfo(champion);
    html += `<div class="team-slot ${isMine(champion) ? 'our-team' : ''}" style="text-align:center;cursor:default;">
      <div class="team-slot-content"><div class="team-slot-name">${tl(champion)}</div><div class="team-slot-seed">#${info ? info.seed : 0}</div></div></div>`;
  } else { html += `<div class="team-slot empty">TBD</div>`; }
  html += '</div>';

  html += '</div></div></div>';
  document.getElementById('tab-bracket').innerHTML = html;
}

function renderFF(key, t1, t2, label) {
  const picked = picks[key];
  const payoutLabel = key.startsWith('champ') ? 'Champ: ' + fmt(PER_WIN.Champ) : 'F4 Win: ' + fmt(PER_WIN.F4);
  let h = `<div class="ff-column"><div><div class="ff-payout">${payoutLabel}</div><h4>${label}</h4></div>`;
  [t1, t2].forEach((team, idx) => {
    const other = idx === 0 ? t2 : t1;
    const thisPicked = picked === team;
    const otherPicked = picked === other;
    if (team) {
      const info = findTeamInfo(team);
      h += `<div class="team-slot ${otherPicked ? 'eliminated' : ''} ${isMine(team) ? 'our-team' : ''}" onclick="pickTeam('${key}','${esc(team)}')">
        <div class="team-slot-content"><div class="team-slot-name">${thisPicked ? '✓ ' : ''}${tl(team)}</div><div class="team-slot-seed">#${info ? info.seed : 0}</div></div></div>`;
    } else { h += `<div class="team-slot empty">TBD</div>`; }
  });
  h += '</div>';
  return h;
}

function pickTeam(key, teamName) {
  // Don't allow changing confirmed results
  if (isConfirmedKey(key)) return;

  if (picks[key] === teamName) {
    delete picks[key];
    cascadeRemove(teamName);
    savePicks(); renderBracket(); renderPortfolio(); renderTeamsRemaining();
    return;
  }

  const oldPick = picks[key];
  if (oldPick) cascadeRemove(oldPick);

  picks[key] = teamName;
  savePicks(); renderBracket(); renderPortfolio(); renderTeamsRemaining();
}

function cascadeRemove(teamName) {
  Object.keys(picks).forEach(pk => {
    if (picks[pk] === teamName) {
      if (pk.includes('-r2-') || pk.includes('-s16-') || pk.includes('-e8-') || pk.startsWith('ff-') || pk.startsWith('champ-')) {
        // Don't remove confirmed results
        const isConfR2 = false; // R2 not confirmed yet
        if (!isConfR2) delete picks[pk];
      }
    }
  });
}

function clearAllPicks() {
  picks = {};
  // Re-apply confirmed results
  Object.entries(CONFIRMED).forEach(([key, result]) => { picks[key] = result.winner; });
  savePicks(); renderBracket(); renderPortfolio(); renderTeamsRemaining();
}
