<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Worrell — 2026 March Madness Tracker</title>
<style>
:root{--bg:#0a0e1a;--card:#131829;--card2:#1a2035;--border:#252d45;--text:#e4e6eb;--muted:#7a829e;--accent:#4f8cff;--green:#2dd4a0;--red:#f0506e;--orange:#f5a623;--gold:#ffd700;--south:#f0506e;--west:#4f8cff;--east:#2dd4a0;--midwest:#f5a623;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
.app{max-width:1500px;margin:0 auto;padding:12px;}
h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{color:var(--muted);font-size:12px;margin-top:2px;}

/* Tabs */
.tabs{display:flex;gap:2px;margin:12px 0;background:var(--card);border-radius:10px;padding:3px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;cursor:pointer;color:var(--muted);font-weight:600;font-size:12px;transition:all 0.2s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--accent);color:#fff;}
.tab-content{display:none;}.tab-content.active{display:block;}

/* Portfolio Table */
.portfolio-table{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0;margin-bottom:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--card2);color:var(--muted);padding:6px 8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;position:sticky;top:0;}
td{padding:5px 8px;border-bottom:1px solid var(--border);}
tr:hover td{background:var(--card2);}
.positive{color:var(--green);}.negative{color:var(--red);}
.team-strikethrough{text-decoration:line-through;opacity:0.6;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.card h3{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--muted);}

/* Filter Toggle */
.filter-toggle{display:flex;gap:8px;margin-bottom:12px;}
.toggle-btn{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card2);color:var(--muted);cursor:pointer;font-weight:600;font-size:12px;transition:all 0.2s;}
.toggle-btn:hover{border-color:var(--accent);}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Viewing Guide */
.game-slot{display:grid;grid-template-columns:60px 50px 1fr 50px 70px 80px;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.game-slot:hover{background:var(--card2);}
.game-slot.ours{background:rgba(79,140,255,0.08);border-left:3px solid var(--accent);}
.game-slot.oursVsOurs{background:rgba(245,166,35,0.08);border-left:3px solid var(--orange);}
.game-slot.hidden{display:none;}
.channel{font-weight:700;font-size:11px;padding:2px 6px;border-radius:4px;text-align:center;}
.channel.CBS{background:#1a5276;color:#fff;}
.channel.TBS{background:#2c3e50;color:#fff;}
.channel.TNT{background:#4a235a;color:#fff;}
.channel.truTV{background:#196f3d;color:#fff;}
.spread{color:var(--muted);font-size:11px;text-align:center;}
.team-name{font-weight:600;}
.team-name.mine{color:var(--accent);}
.seed-badge{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;font-weight:700;font-size:10px;background:var(--card2);color:var(--text);margin-right:4px;}
.note{font-size:10px;padding:3px 8px;border-radius:4px;margin-left:6px;}
.note.root-for{background:rgba(45,212,160,0.15);color:var(--green);}
.note.root-against{background:rgba(240,80,110,0.15);color:var(--red);}
.note.watch{background:rgba(245,166,35,0.15);color:var(--orange);}
.note.conflict{background:rgba(245,166,35,0.25);color:var(--orange);font-weight:700;}
.importance{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
.imp-high{background:var(--red);}
.imp-med{background:var(--orange);}
.imp-low{background:var(--green);}

/* Day header */
.day-header{background:var(--card2);padding:8px 12px;font-weight:700;font-size:13px;border-radius:6px;margin:10px 0 6px;}
.time-header{background:var(--border);padding:4px 12px;font-size:11px;color:var(--muted);font-weight:600;}

/* Bracket Styles */
.bracket-container{display:flex;flex-direction:column;gap:20px;}
.region-bracket{margin-bottom:20px;}
.region-bracket h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
.region-bracket.south h3{color:var(--south);}
.region-bracket.west h3{color:var(--west);}
.region-bracket.east h3{color:var(--east);}
.region-bracket.midwest h3{color:var(--midwest);}

.bracket-grid{display:grid;grid-template-columns:auto auto auto auto;gap:0;column-gap:16px;align-items:start;}
.bracket-column{display:flex;flex-direction:column;gap:12px;justify-content:space-around;}
.bracket-column h4{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:4px;text-align:center;}
.bracket-payout{font-size:11px;color:var(--green);font-weight:700;text-align:center;margin-bottom:2px;}

.team-slot{background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:8px;min-width:120px;cursor:pointer;transition:all 0.2s;font-size:11px;}
.team-slot:hover{border-color:var(--accent);background:var(--card);}
.team-slot.empty{color:var(--muted);text-align:center;font-style:italic;}
.team-slot.our-team{border-left:3px solid var(--accent);background:rgba(79,140,255,0.1);}
.team-slot.our-team .team-name{color:var(--accent);font-weight:700;}
.team-slot.eliminated{opacity:0.4;color:var(--muted);text-decoration:line-through;}

.team-slot-content{display:flex;flex-direction:column;gap:2px;}
.team-slot-name{font-weight:600;color:var(--text);}
.team-slot-seed{font-size:9px;color:var(--muted);}
.team-slot-price{font-size:9px;color:var(--accent);margin-top:2px;font-weight:600;}

.final-four-container{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:20px;}
.final-four-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;align-items:center;}
.ff-column{display:flex;flex-direction:column;gap:12px;}
.ff-column h4{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;text-align:center;margin-bottom:4px;}
.ff-payout{font-size:11px;color:var(--green);font-weight:700;text-align:center;margin-bottom:2px;}
.ff-champion{grid-column:1/5;text-align:center;}
.ff-champion h4{margin-bottom:8px;}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:1000px){.grid-2,.grid-4{grid-template-columns:1fr;}}

/* Scenario cards */
.scenario{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.scenario h4{font-size:13px;font-weight:700;margin-bottom:6px;}
.scenario .prob{color:var(--muted);font-size:11px;}
.scenario .payout{font-size:16px;font-weight:700;margin:4px 0;}
.scenario .path{font-size:11px;color:var(--muted);line-height:1.6;}
.scenario .path .win{color:var(--green);}
.scenario .path .loss{color:var(--red);}
</style>
</head>

};

// Team probabilities
const TEAM_PROBS = {
  "Iowa St.": {r1:.978,r2:.749,s16:.497,e8:.244,f4:.126,champ:.060},
  "Illinois": {r1:.966,r2:.766,s16:.374,e8:.197,f4:.094,champ:.043},

  "Villanova": {r1:.464,r2:.064,s16:.026,e8:.008,f4:.002,champ:.001}
};

// New picks model: {region-round-slot: teamName, ...}
let picks = JSON.parse(localStorage.getItem('calcutta2026_picks') || '{}');
function savePicks(){ localStorage.setItem('calcutta2026_picks', JSON.stringify(picks)); }

const isMine = t => MY.hasOwnProperty(t);
const fmt = n => '$' + Math.round(n).toLocaleString();
// Escape team names for use in onclick HTML attributes (handles apostrophes)
const esc = s => s.replace(/'/g, "\\'");

// Get team info
function findTeamInfo(teamName) {
  for (const [region, games] of Object.entries(BRACKET)) {
    for (const game of games) {
      if (game.t1 === teamName) return {name: teamName, seed: game.s1, region};
      if (game.t2 === teamName) return {name: teamName, seed: game.s2, region};
    }
  }
  return null;
}

// Calculate payouts for a team based on ALL picks (including F4 and Champ)
function getTeamPayouts(teamName) {
  let totalPayout = 0;
  if (!isMine(teamName)) return 0;

  // Scan ALL pick keys for this team name
  // Round payout mapping based on key pattern
  Object.entries(picks).forEach(([key, val]) => {
    if (val !== teamName) return;
    if (key.includes('-r1-')) totalPayout += PER_WIN.R1;
    else if (key.includes('-r2-')) totalPayout += PER_WIN.R2;
    else if (key.includes('-s16-')) totalPayout += PER_WIN.S16;
    else if (key.includes('-e8-')) totalPayout += PER_WIN.E8;
    else if (key.startsWith('ff-')) totalPayout += PER_WIN.F4;
    else if (key.startsWith('champ-')) totalPayout += PER_WIN.Champ;
  });

  return totalPayout;
}

// TAB SWITCHING
// ============================================================
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

// ============================================================
// PORTFOLIO TABLE
// ============================================================
function renderPortfolio(){
  let rows = [];

  // Track eliminated teams
  const eliminated = new Set();
  Object.entries(picks).forEach(([key, teamName]) => {
    // If a team is picked in a later round, any team in earlier R1 slot that conflicts is eliminated
  });

  // Build table rows for each team
  Object.entries(MY).forEach(([teamName, price]) => {
    const info = findTeamInfo(teamName);
    const payout = getTeamPayouts(teamName);
    const netBalance = payout - price;
    const recovered = price > 0 ? (payout / price * 100) : 0;

    rows.push({
      teamName,
      region: info ? info.region : '?',
      seed: info ? info.seed : 0,
      price,
      payout,
      netBalance,
      recovered,
      isEliminated: false
    });
  });

  let html = '<table><thead><tr><th>Team Name</th><th>Region</th><th>Seed</th><th>Purchase Price</th><th>Won to Date</th><th>Potential Winnings</th><th>Net Balance</th><th>% Recovered</th></tr></thead><tbody>';

  let totalPrice = 0, totalWon = 0, totalPotential = 0, totalNet = 0;

  rows.forEach(row => {
    totalPrice += row.price;
    totalPotential += row.payout;
    totalNet += row.netBalance;

    const rowClass = row.isEliminated ? 'team-strikethrough' : '';
    const balanceClass = row.netBalance >= 0 ? 'positive' : 'negative';

    html += `<tr>
      <td><span class="${rowClass}">${row.teamName}</span></td>
      <td>${row.region}</td>
      <td>#${row.seed}</td>
      <td>${fmt(row.price)}</td>
      <td>$0</td>
      <td class="positive">${fmt(row.payout)}</td>
      <td class="${balanceClass}">${row.netBalance >= 0 ? '+' : ''}${fmt(row.netBalance)}</td>
      <td>${row.recovered.toFixed(1)}%</td>
    </tr>`;
  });

  html += `<tr style="font-weight:700;background:var(--card2);">
    <td>TOTAL</td>
    <td></td>
    <td></td>
    <td>${fmt(totalPrice)}</td>
    <td>$0</td>
    <td class="positive">${fmt(totalPotential)}</td>
    <td class="${totalNet >= 0 ? 'positive' : 'negative'}">${totalNet >= 0 ? '+' : ''}${fmt(totalNet)}</td>
    <td>${totalPrice > 0 ? (totalPotential / totalPrice * 100).toFixed(1) : 0}%</td>
  </tr>`;

  html += '</tbody></table>';

  document.getElementById('portfolioTable').innerHTML = html;
}

// ============================================================
// VIEWING GUIDE
// ============================================================
function renderGuide(){
  let allGames = [];
  Object.entries(BRACKET).forEach(([region, games])=>{
    games.forEach((g,i)=>{
      const t1Mine = isMine(g.t1), t2Mine = isMine(g.t2);
      const bothMine = t1Mine && t2Mine;

      let notes = [];
      const pairIdx = Math.floor(i / 2);
      const partnerIdx = i % 2 === 0 ? i + 1 : i - 1;
      const partner = games[partnerIdx];

      if(t1Mine || t2Mine){
        const myTeam = t1Mine ? g.t1 : g.t2;
        const partnerT1Mine = isMine(partner.t1);
        const partnerT2Mine = isMine(partner.t2);

        if(!partnerT1Mine && !partnerT2Mine){
          const easier = partner.s1 > partner.s2 ? partner.t1 : partner.t2;
          const easierSeed = Math.max(partner.s1, partner.s2);
          notes.push({type:'root-for', text:`Root for ${easierSeed}-seed ${easier} (easier R2 matchup)`, imp:'low'});
        } else if(partnerT1Mine || partnerT2Mine){
          const otherMyTeam = partnerT1Mine ? partner.t1 : partner.t2;
          notes.push({type:'watch', text:`R2 could match ${myTeam} vs ${otherMyTeam} (both ours!)`, imp:'med'});
        }
      }

      if(bothMine){
        notes.unshift({type:'conflict', text:`Both teams are ours! Guaranteed R1 win + loss.`, imp:'high'});
      }

      allGames.push({...g, region, gameIdx:i, t1Mine, t2Mine, bothMine, notes});
    });
  });

  const timeToMin = t => {
    const [time, ampm] = t.split(' ');
    let [h, m] = time.split(':').map(Number);
    if(ampm === 'PM' && h !== 12) h += 12;
    if(ampm === 'AM' && h === 12) h = 0;
    return h * 60 + m;
  };

  const dayOrder = d => d.startsWith('Thu') ? 0 : 1;
  allGames.sort((a,b) => dayOrder(a.date) - dayOrder(b.date) || timeToMin(a.time) - timeToMin(b.time));

  let html = '<div class="card"><h3>Round 1 Viewing Guide</h3>';

  html += `<div class="filter-toggle">
    <button class="toggle-btn" id="filterAll" onclick="toggleFilter('all')">All Games</button>
    <button class="toggle-btn active" id="filterOurs" onclick="toggleFilter('ours')">Our Games Only</button>
  </div>`;

  html += `<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">

function pickTeam(key, teamName) {
  // Toggle: if already picked this team, deselect
  if (picks[key] === teamName) {
    delete picks[key];
    // Also cascade-remove this team from all later rounds
    cascadeRemove(teamName);
    savePicks();
    renderBracket();
    renderPortfolio();
    return;
  }

  // If picking a different team, first remove the OLD pick's downstream appearances
  const oldPick = picks[key];
  if (oldPick) {
    cascadeRemove(oldPick);
  }

  picks[key] = teamName;

  // Find the loser (the other team in this matchup) and cascade-remove them
  // The loser is whoever was the other option in this slot
  // We don't need to explicitly find them — cascadeRemove handles it by scanning all keys

  savePicks();
  renderBracket();
  renderPortfolio();
}

// Remove a team from all picks globally (used when they lose or are deselected)
function cascadeRemove(teamName) {
  Object.keys(picks).forEach(pk => {
    if (picks[pk] === teamName) {
      // Don't remove from the round where they were first picked (their win)
      // DO remove from all LATER rounds
      // Actually, we want to remove from downstream only. But since we don't know
      // the "origin" easily, we remove from all rounds AFTER R1 for regional keys,
      // and from ff/champ keys
      if (pk.includes('-r2-') || pk.includes('-s16-') || pk.includes('-e8-') || pk.startsWith('ff-') || pk.startsWith('champ-')) {
        delete picks[pk];
      }
    }
  });
}

function clearAllPicks() {
  picks = {};
  savePicks();
  renderBracket();
  renderPortfolio();
}

      wins: {R1: 12, R2: 3, S16: 2},
      payout: 12 * PER_WIN.R1 + 3 * PER_WIN.R2 + 2 * PER_WIN.S16,
      prob: "~7%"
    },
    // --- UPSIDE ---
    {
      title: "Solid Return: Win 11 R1 + Illinois Elite 8 + Iowa St. Sweet 16",
      description: "Strong R1 showing, Illinois goes on a run to E8, Iowa St. makes Sweet 16. Two deep-ish runs plus breadth. ~$12K profit.",
      type: "upside",
      wins: {R1: 11, R2: 3, S16: 2, E8: 1},
      payout: 11 * PER_WIN.R1 + 3 * PER_WIN.R2 + 2 * PER_WIN.S16 + 1 * PER_WIN.E8,
      prob: "~5%"
    },
    {
      title: "Iowa St. Final Four + Illinois Sweet 16 + Depth",
      description: "Iowa St. reaches the Final Four for a massive payout. Illinois and one other team make S16. 11 R1 wins. ~$50K profit.",
      type: "upside",
      wins: {R1: 11, R2: 3, S16: 2, E8: 1, F4: 1},
      payout: 11 * PER_WIN.R1 + 3 * PER_WIN.R2 + 2 * PER_WIN.S16 + 1 * PER_WIN.E8 + 1 * PER_WIN.F4,
      prob: "~2%"
    },
    {
      title: "Dream: Iowa St. Championship + Illinois E8",
      description: "Iowa State wins every round through the championship ($102K from Iowa St. alone). Illinois makes Elite 8. 12 R1 wins. Total portfolio payout ~$195K.",
      type: "upside",
      wins: {R1: 12, R2: 3, S16: 2, E8: 2, F4: 1, Champ: 1},
      payout: 12 * PER_WIN.R1 + 3 * PER_WIN.R2 + 2 * PER_WIN.S16 + 2 * PER_WIN.E8 + 1 * PER_WIN.F4 + 1 * PER_WIN.Champ,
      prob: "~0.3%"
    }
  ];

  let html = `<div class="card"><h3>Break-Even Analysis: Need ${fmt(breakEvenTarget)} in Payouts</h3>
    <div style="color:var(--muted);font-size:11px;margin-bottom:12px;">
      Reference: R1 Win = ${fmt(PER_WIN.R1)} | R2 Win = ${fmt(PER_WIN.R2)} | S16 Win = ${fmt(PER_WIN.S16)} | E8 Win = ${fmt(PER_WIN.E8)} | F4 Win = ${fmt(PER_WIN.F4)} | Champ = ${fmt(PER_WIN.Champ)}
    </div>`;

  html += '<h4 style="color:var(--red);margin:12px 0 8px;">Downside Scenarios</h4>';
  scenarios.filter(s=>s.type==='downside').forEach(s => {
    const surplus = s.payout - breakEvenTarget;
    const recoveryPct = (s.payout / breakEvenTarget * 100).toFixed(0);
    html += `<div class="scenario" style="border-left:3px solid var(--red);">
      <h4>${s.title}</h4>
      <div class="prob">Estimated probability: ${s.prob}</div>
      <div class="payout negative">${fmt(s.payout)} → Loss: ${fmt(Math.abs(surplus))} (${recoveryPct}% cost recovery)</div>
      <div class="path">
        ${Object.entries(s.wins).map(([round, count]) => `<span class="win">${count} ${round} wins (${fmt(count * PER_WIN[round])})</span>`).join(' + ')}
      </div>
    </div>`;
  });

  html += '<h4 style="color:var(--green);margin:16px 0 8px;">Upside Scenarios</h4>';
  scenarios.filter(s=>s.type==='upside').forEach(s => {
    const surplus = s.payout - breakEvenTarget;
    const roiPct = (surplus / breakEvenTarget * 100).toFixed(0);
    html += `<div class="scenario" style="border-left:3px solid var(--green);">
      <h4>${s.title}</h4>
      <div class="prob">Estimated probability: ${s.prob}</div>
      <div class="payout positive">${fmt(s.payout)} → Profit: ${fmt(surplus)} (+${roiPct}% ROI)</div>
      <div class="path">
        ${Object.entries(s.wins).map(([round, count]) => `<span class="win">${count} ${round} wins (${fmt(count * PER_WIN[round])})</span>`).join(' + ')}
      </div>
    </div>`;
  });

  html += `<div style="margin-top:16px;padding:12px;background:var(--card2);border-radius:8px;">
    <h4 style="font-size:13px;margin-bottom:8px;">Quick Math</h4>
    <table>
      <tr><td>R1 wins needed to break even (R1 only)</td><td style="font-weight:700;">${Math.ceil(breakEvenTarget / PER_WIN.R1)} wins (we have 13 teams)</td></tr>
      <tr><td>If we win 10 R1 games</td><td>Need ${fmt(breakEvenTarget - 10*PER_WIN.R1)} more from later rounds</td></tr>
      <tr><td>If we win 11 R1 games</td><td>Need ${fmt(breakEvenTarget - 11*PER_WIN.R1)} more from later rounds</td></tr>
      <tr><td>If we win 12 R1 games</td><td>Need ${fmt(breakEvenTarget - 12*PER_WIN.R1)} more from later rounds</td></tr>
      <tr><td>One Sweet 16 win equivalent</td><td>${(PER_WIN.S16/PER_WIN.R1).toFixed(1)} R1 wins</td></tr>
      <tr><td>One Elite 8 win equivalent</td><td>${(PER_WIN.E8/PER_WIN.R1).toFixed(1)} R1 wins</td></tr>
      <tr><td>One Final Four win equivalent</td><td>${(PER_WIN.F4/PER_WIN.R1).toFixed(1)} R1 wins</td></tr>
      <tr><td>Championship win equivalent</td><td>${(PER_WIN.Champ/PER_WIN.R1).toFixed(1)} R1 wins</td></tr>
    </table>
  </div>`;

  html += '</div>';
  document.getElementById('tab-scenarios').innerHTML = html;
}

  renderPortfolio();
